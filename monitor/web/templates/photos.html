{% extends "base.html" %}
{% block title %}Photos — {{ config.APP_NAME }}{% endblock %}
{% block content %}
<h2>Photo Browser</h2>

<p>
  <button id="capture-btn" onclick="captureNow()">Capture Now</button>
  <span id="capture-status" style="margin-left:0.75rem; color:#555; font-size:0.85em;"></span>
</p>
<p id="photo-count" data-count="0">Loading…</p>
<table>
  <thead>
    <tr>
      <th>Preview</th>
      <th>Filename</th>
      <th>Trigger</th>
      <th>Sensor</th>
      <th>Timestamp</th>
      <th class="right">Size (KB)</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="photo-tbody">
    <tr><td colspan="7">Loading…</td></tr>
  </tbody>
</table>
<div id="photo-pager">
  <button id="photo-prev" onclick="renderPhotoPage(curPage-1)" disabled>Prev</button>
  <span id="photo-page-info"></span>
  <button id="photo-next" onclick="renderPhotoPage(curPage+1)" disabled>Next</button>
</div>

<script>
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

var allPhotos = [];
var curPage   = 1;
var PAGE_SIZE = 10;

function updateCount(n) {
  var el = document.getElementById("photo-count");
  el.setAttribute("data-count", n);
  el.textContent = n + " photo(s)";
}

function makeRow(p) {
  return "<tr>"
    + '<td><a href="' + escapeHtml(p.url) + '" target="_blank">'
    +   '<img class="photo-thumb" src="' + escapeHtml(p.url) + '" alt="photo">'
    + '</a></td>'
    + "<td>" + escapeHtml(p.filename) + "</td>"
    + "<td>" + escapeHtml(p.trigger) + "</td>"
    + "<td>" + escapeHtml(p.sensor_id) + "</td>"
    + "<td>" + escapeHtml(p.timestamp) + "</td>"
    + '<td class="right">' + escapeHtml(p.size_kb) + "</td>"
    + '<td class="photo-actions">'
    +   '<a href="' + escapeHtml(p.url) + '" target="_blank" class="button">View</a>'
    +   '<a href="' + escapeHtml(p.download_url) + '" class="button">Download</a>'
    +   '<button class="delete" data-filename="' + escapeHtml(p.filename) + '">Delete</button>'
    + "</td>"
    + "</tr>";
}

function renderPhotoPage(page) {
  curPage = page;
  var start = (page - 1) * PAGE_SIZE;
  var pagePhotos = allPhotos.slice(start, start + PAGE_SIZE);
  var html = "";
  for (var i = 0; i < pagePhotos.length; i++) { html += makeRow(pagePhotos[i]); }
  document.getElementById("photo-tbody").innerHTML =
    html || '<tr><td colspan="7">No photos on this page.</td></tr>';
  updatePhotoPager();
}

function updatePhotoPager() {
  var totalPages = Math.ceil(allPhotos.length / PAGE_SIZE) || 1;
  document.getElementById("photo-page-info").textContent =
    "Page " + curPage + " of " + totalPages;
  document.getElementById("photo-prev").disabled = (curPage <= 1);
  document.getElementById("photo-next").disabled = (curPage >= totalPages);
}

function loadPhotos() {
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "/api/photos", true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status !== 200) {
      document.getElementById("photo-tbody").innerHTML =
        '<tr><td colspan="7">Error loading photos.</td></tr>';
      updateCount(0);
      return;
    }
    var photos;
    try { photos = JSON.parse(xhr.responseText); } catch(e) {
      document.getElementById("photo-tbody").innerHTML =
        '<tr><td colspan="7">Error parsing response.</td></tr>';
      updateCount(0);
      return;
    }
    allPhotos = photos;
    updateCount(photos.length);
    renderPhotoPage(1);
  };
  xhr.send();
}

function captureNow() {
  var btn = document.getElementById("capture-btn");
  var status = document.getElementById("capture-status");
  btn.disabled = true;
  status.textContent = "Capturing…";
  var xhr = new XMLHttpRequest();
  xhr.open("POST", "/api/photos/capture", true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    btn.disabled = false;
    var resp;
    try { resp = JSON.parse(xhr.responseText); } catch(e) { resp = {}; }
    if (xhr.status === 200 && resp.ok) {
      status.textContent = "Captured: " + resp.photo.filename;
      allPhotos.unshift(resp.photo);
      updateCount(allPhotos.length);
      renderPhotoPage(1);
    } else {
      status.textContent = "Error: " + (resp.error || xhr.status);
    }
  };
  xhr.send();
}

document.getElementById("photo-tbody").addEventListener("click", function(e) {
  var btn = e.target;
  if (!btn || btn.tagName !== "BUTTON" || !btn.classList.contains("delete")) return;
  var filename = btn.getAttribute("data-filename");
  if (!confirm("Delete " + filename + "?")) return;
  var xhr = new XMLHttpRequest();
  xhr.open("POST", "/api/photos/" + encodeURIComponent(filename) + "/delete", true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    var resp;
    try { resp = JSON.parse(xhr.responseText); } catch(e) { resp = {}; }
    if (xhr.status === 200 && resp.ok) {
      var idx = allPhotos.findIndex(function(p) { return p.filename === filename; });
      if (idx !== -1) allPhotos.splice(idx, 1);
      updateCount(allPhotos.length);
      var totalPages = Math.ceil(allPhotos.length / PAGE_SIZE) || 1;
      if (curPage > totalPages) curPage = totalPages;
      renderPhotoPage(curPage);
    } else {
      alert("Delete failed: " + (resp.error || xhr.status));
    }
  };
  xhr.send();
});

loadPhotos();
</script>
{% endblock %}
